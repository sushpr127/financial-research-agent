[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    integration: marks tests that call real external APIs (deselect with -m "not integration")

# Output
addopts =
    -v
    --tb=short
    --no-header
    -m "not integration"

# Suppress noisy warnings from LangChain/Pydantic on Python 3.14
filterwarnings =
    ignore::UserWarning:pydantic
    ignore::DeprecationWarning:langchain
