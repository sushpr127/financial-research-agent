version: "3.9"

services:

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial-research-backend
    ports:
      - "8000:8000"
    env_file:
      - .env                          # your real API keys (gitignored)
    volumes:
      - ./outputs:/app/outputs        # PDFs persist on your machine
      - ./.cache:/app/.cache          # Yahoo Finance cache persists
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── React frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: financial-research-frontend
    ports:
      - "3000:80"                     # nginx serves on 80 inside, mapped to 3000 outside
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: financial-research-network
